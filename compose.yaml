services:
  perpixai-app:
    build:
      context: .
      dockerfile: Dockerfile

      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_S3_ENDPOINT: ${VITE_S3_ENDPOINT}
    ports:
      - "4173:80"
    restart: unless-stopped
    pull_policy: build
    networks:
      - turing

networks:
  turing:
    external: true
