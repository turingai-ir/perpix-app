services:
  perpixai-app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_API_BASE_URL: ${VITE_APP_API_BASE_URL}
        VITE_S3_ENDPOINT: ${VITE_S3_ENDPOINT}
    image: turing-app:latest
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - turing

networks:
  turing:
    external: true
